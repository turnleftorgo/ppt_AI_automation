    你剛才在 reason 步驟生成的【根本原因】已經過 sanitize 脫敏處理，用戶當前在介面上看到並要調整的內容如下。請基於你 reason 步驟的完整上下文記憶（含 #資料分析 與 #AI推理 原文）理解用戶意圖，但改寫的對象是「用戶當前看到的脫敏版內容」，而不是你 reason 步驟的原文。

