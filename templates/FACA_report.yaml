    - name: sanitize
      prompt: |
        # Task / 資料脫敏

        請將以下內容按段落分區處理：「#資料分析」段落原封不動保留，僅對「#AI推理」段落進行數據脫敏。

        ## 處理步驟
        1. 將輸入內容按「#資料分析」與「#AI推理」標記拆分為兩個段落
        2. 「#資料分析」段落：原封不動保留，不做任何修改
        3. 「#AI推理」段落：按照下方替換規則進行數據脫敏
        4. 將兩個段落重新組合，保持原有的標記與結構

        ## 輸出格式
        - 必須同時包含「#資料分析」與「#AI推理」兩個段落
        - 「#資料分析」段落內容必須與輸入完全一致
        - 「#AI推理」段落內容為脫敏後的版本

        ## 替換規則（嚴格執行）
        - 日期/時間（如 10/28、2024-01-15、10:30）→ 【日期】
        - 線體/機台編號（如 M1線、18#機台、CNC6）→ 【線體編號】或【機台編號】
        - AQL、抽樣標準、尺寸、角度、公差、閾值、製程設定與檢驗標準的具體數值，統一替換為【參數值】；案例序號與條列序號保留。
        - 具體數量/不良率（如 120pcs、50pcs、F/R 0.5%）→ 【數量】或【不良率】
        - 批次號/工單號 → 【批次號】
        - 指標名稱（如 Cell NDA、WF NDA）保留，只替換數值

        ## 範例（分區處理）
        輸入：
        #資料分析
        1. Case: J82x 喇叭網偏位，10/28 M1線生產，F/R 0.5%

        #AI推理
        1. 查詢10/28 M1線生產記錄，18#機台首件NG。
        2. 庫存40pcs，Cell NDA 33.3%（25/75）。

        輸出：
        #資料分析
        1. Case: J82x 喇叭網偏位，10/28 M1線生產，F/R 0.5%

        #AI推理
        1. 查詢【日期】【線體編號】生產記錄，【機台編號】首件NG。
        2. 庫存【數量】，Cell NDA 【不良率】（【數量】）。

        ## 嚴格限制
        1. 絕對保留原意、因果邏輯與原本的標號
        2. 未涉及具體數據的推理句必須一字不改地保留
        3. 除了替換數據，絕對不允許重新造句或改變句型結構
        4. 如無法判定，保留原文，不得反覆推測或輸出判斷過程。

        【待脫敏內容】
        {{reason_result}}
      input_vars:
      - reason_result
      output_var: final_result
- target_placeholder: CORRECTIVE
  module: 改善對策
  module_label: 改善對策
  prompt: |
    # Task / 任務 (Task)
    請根據我提供的【Meta Data 元數據】、【問題描述】、【問題分析】、【根本原因】與【圍堵措施】，推演並撰寫最終的【改善對策 (Corrective Actions)】。
    在撰寫時，你必須嚴格遵守以下邏輯與推演限制（只要邏輯有關聯，維持專業工程風格即可）：

    1. 根因對策化 (工程防呆)：針對【根本原因】提出治具修改、機台程式優化（如加入報警停機、防呆 Sensor）或加工參數調整，從物理或系統層面防止異常發生。
    2. 圍堵長效化 (檢驗升級)：將【圍堵措施】中的人工全檢或臨時動作，轉化為長期的檢驗機制。如導入 CCD/AOI 視覺識別、增加專用檢具（Go/No-go）、或在治具上增加檢測功能。
    3. 作業標準化 (SOP與培訓)：針對人員操作，必須包含製作「單點課程 (OPL)」或「不良樣板」，並對生產與檢驗人員（IPQC/FQC）進行教育訓練或盲測考核。
    4. 品管卡控 (QC Gate)：明確提出品質抽驗標準的加嚴（例如：增加巡檢頻率 1次/2H，或 OQC 抽檢 AQL 標準由 0.65 加嚴至 0.4）。

    # Format / 格式 (Format)
    每次回覆你必須且只能返回一個嚴格的 JSON 對象，包含兩個字段。絕對不要輸出任何其他內容、解釋或 markdown 標記（如 ```json）：
    - "ack": 簡短回應（不超過 50 字），確認你理解了異常根因，以及本次改善對策的防堵重點。
    - "content": 最終的【改善對策】文本內容。請使用 
     處理換行以確保 JSON 格式合法。

    【content 字段的寫作要求】
    - 語言風格：強烈的祈使語氣與行動導向（如「增加...」、「優化...」、「導入...」、「攔截...」）。重度使用行業黑話與中英夾雜（如 防呆, 單點課程, CCD, AOI, AIM, AQL, IPQC, FQC, Go/Nogo）。
    - 結構模板：請拆分成編號步驟（1. 2. 3. ...），通常包含製程改善、檢驗改善、人員管理三個維度。
    - 內容約束：確保對策與輸入的根本原因、圍堵措施強相關，形成完整的邏輯閉環。

    示例：
    {"ack": "好的，已針對磁鐵偏位根因，擬定治具防呆優化、AOI視覺導入及AQL加嚴等改善對策。", "content": "1. 治具防呆：生技優化磁鐵裝配治具，X向避位空間增加0.1mm，並加入感應器，未貼合即報警鎖機。
    2. 檢驗升級：將磁鐵偏位不良加入AOI機台檢測項目，系統自動比對NG範本攔截。
    3. 人員培訓：QE製作磁鐵偏位單點課程，懸掛於檢驗工站，對IPQC及FQC進行教育訓練與盲測。
    4. 品管加嚴：OQC對此不良做重點抽檢，AQL抽樣標準由0.65加嚴至0.4，防堵不良流出。"}

    【輸入區】
