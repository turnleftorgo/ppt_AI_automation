    - name: reason
      prompt: |
        # Task / 任務 (Task)
        請根據我提供的【Meta Data 元數據】、【問題描述】、【問題分析】與【參考資料】，總結並提煉出對應的【根本原因】。

        ## 參考資料（來自知識庫）
        {{extract_result}}

        ## 上下文背景
        {{context_background}}

        ## 寫作規則
        在撰寫時，你必須嚴格遵守以下邏輯與推演限制：

        1. 雙維歸因結構：根本原因必須且通常只包含兩個獨立維度：
           - 「產生原因（或製程原因）」：物理上到底是什麼異常導致了產品損壞（為什麼會壞）。
           - 「流出原因（或漏出原因）」：品管或系統的哪道防線失效，導致殘次品沒有被攔截（為什麼沒攔住）。
        2. 鎖定物理根因：從【問題分析】中提取最核心的物理、化學或動作失誤。用簡潔的「A發生異常 -> 導致B狀態 -> 造成C不良」的因果長句式表達。
        3. 明確漏失節點：流出原因必須明確指出在哪個環節失效。
        4. 剔除調查廢話：根本原因是最終的「判決書」，直接給出客觀定論。

        # Format / 格式 (Format)
        每次回覆你必須且只能返回一個嚴格的 JSON 對象，包含兩個字段。絕對不要輸出任何其他內容、解釋或 markdown 標記（如 ```json）：
        - "ack": 簡短回應（不超過 50 字），確認你已從分析中提取出核心失效機制與防線漏洞。
        - "content": |
            #資料分析
            （原封不動把上面「參考資料」的內容放上來）

            #AI推理
            （你生成的根本原因最終文本內容）

        【content #AI推理 字段的寫作要求】
        - 語言風格：語言極度精煉、客觀冷峻。重度使用製造業黑話與中英夾雜（如 CNC, Assy, CCD, FQC, AOI, 治具, 載具, 夾屑, 偏位, 漏銑）。
        - 結構模板：請強制使用「產生原因：... \n 流出原因：...」 或 「1. 產生原因：... \n 2. 流出原因：...」 的排版結構。
        - 內容約束：確保提煉出的原因與提供的【Meta Data】製程強相關，並與【問題分析】的結論完全一致。

        示例：
        {"ack": "好的，已從問題分析中精準提取出治具干涉的物理根因與AOI漏檢的防線缺失，生成根本原因。", "content": "#資料分析\n1. 案例A：裝配治具間隙偏下限導致溢膠干涉...\n2. 案例B：UV開裂非AOI全檢項目...\n\n#AI推理\n1. 產生原因：裝配治具X向設計間隙偏下限，與小件來料溢膠產生干涉，導致裝配壓合時UV膠受擠壓開裂。\n2. 流出原因：Orion flex UV開裂非AOI全檢項目，且目視檢驗人員未及時發現，導致不良品流出。"}

        【輸入區】
        Meta Data: {{metadata}}
        問題描述: {{issue_description}}
        問題分析: {{context_ISSUE_ANALYSIS}}
      input_vars:
      - extract_result
      - context_background
      - metadata
      - issue_description
      - context_ISSUE_ANALYSIS
      output_var: reason_result
    - name: sanitize
      prompt: |
        # Task / 資料脫敏

        請將以下內容按段落分區處理：「#資料分析」段落原封不動保留，僅對「#AI推理」段落進行數據脫敏。

        ## 處理步驟
        1. 將輸入內容按「#資料分析」與「#AI推理」標記拆分為兩個段落
        2. 「#資料分析」段落：原封不動保留，不做任何修改
        3. 「#AI推理」段落：按照下方替換規則進行數據脫敏
        4. 將兩個段落重新組合，保持原有的標記與結構

        ## 輸出格式
        - 必須同時包含「#資料分析」與「#AI推理」兩個段落
        - 「#資料分析」段落內容必須與輸入完全一致
        - 「#AI推理」段落內容為脫敏後的版本

        ## 替換規則（嚴格執行）
        - 日期/時間（如 10/28、2024-01-15、10:30）→ 【日期】
        - 線體/機台編號（如 M1線、18#機台、CNC6）→ 【線體編號】或【機台編號】
        - AQL、抽樣標準、尺寸、角度、公差、閾值、製程設定與檢驗標準的具體數值，統一替換為【參數值】；案例序號與條列序號保留。
        - 具體數量/不良率（如 120pcs、50pcs、F/R 0.5%）→ 【數量】或【不良率】
        - 批次號/工單號 → 【批次號】
        - 指標名稱（如 Cell NDA、WF NDA）保留，只替換數值

        ## 範例（分區處理）
        輸入：
        #資料分析
        1. Case: J82x 喇叭網偏位，10/28 M1線生產，F/R 0.5%

        #AI推理
        1. 查詢10/28 M1線生產記錄，18#機台首件NG。
        2. 庫存40pcs，Cell NDA 33.3%（25/75）。

        輸出：
        #資料分析
        1. Case: J82x 喇叭網偏位，10/28 M1線生產，F/R 0.5%

        #AI推理
        1. 查詢【日期】【線體編號】生產記錄，【機台編號】首件NG。
        2. 庫存【數量】，Cell NDA 【不良率】（【數量】）。

        ## 嚴格限制
        1. 絕對保留原意、因果邏輯與原本的標號
        2. 未涉及具體數據的推理句必須一字不改地保留
        3. 除了替換數據，絕對不允許重新造句或改變句型結構
        4. 如無法判定，保留原文，不得反覆推測或輸出判斷過程。

        【待脫敏內容】
        {{reason_result}}
      input_vars:
      - reason_result
      output_var: final_result
