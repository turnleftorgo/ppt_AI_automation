    \ 碼攔截，並安排專人重工（Rework）或 Sorting。\n   - 「在製品（WIP）」：產線立即停線檢查，FQC/OQC 系統攔截確認品質。\n\
    2. 檢驗手段對齊：圍堵的 Sorting（挑磚）動作必須對應【問題描述】中的不良形態（如：外觀不良用目視/CCD放大；尺寸不良用實配檢具/Go-NoGo檢具；內部不良用\
    \ X-Ray 或重新過 AIM 測試站）。\n3. 堵住流出點（Escape 防堵）：必須針對【根本原因】中提到的漏失點（漏檢），給出立即的防堵指令（如：FQC\
    \ 製作單點課程教育訓練、OQC 抽檢 AQL 加嚴、臨時導入 100% 全檢）。\n4. 標識要求：所有經過重工或全檢 OK 的物料，出貨時必須明確標註（如：外箱標識\"\
