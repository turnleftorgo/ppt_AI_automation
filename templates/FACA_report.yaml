    \ markdown 標記（如 ```json）：\n- \"ack\": 簡短回應（不超過 50 字），確認你理解了異常範圍與對應的物料攔截重點。\n-\
    \ \"content\": 根據輸入信息生成的【圍堵措施】最終文本內容。請使用 \\n 處理換行以確保 JSON 格式合法。\n\n【content 字段的寫作要求】\n\
    - 語言風格：語言精煉、去個人化。動賓結構開頭（如「排查...」、「攔截...」、「導入...」）。重度使用行業黑話與中英夾雜（如 Sorting, FAE,\
    \ FQC, AQL, 2D碼, 單點課程, Go-NoGo, 重工）。不允許出現模糊字眼，可用虛擬具體數據（如「庫存約 15K 全部扣貨」）增加真實感。\n\
    - 結構模板：請拆分成編號步驟（1. 2. 3. ...）進行條列式說明。\n- 內容約束：內容必須強烈呼應輸入的四個維度，形成「哪裡發現不良 -> 哪裡就有人去攔截」、「漏檢了什麼\
