  module: 圍堵措施
  module_label: 圍堵措施
  prompt: |
    # Task / 任務 (Task)
    請根據我提供的【Meta Data】、【問題描述】、【問題分析】與【根本原因】，推理並撰寫對應的【圍堵措施】（Containment Action）。
    在撰寫時，你必須嚴格遵守以下邏輯與推演限制（只需關聯已知信息，保證風格專業，暫不要求深層技術推理）：

    1. 物料分佈清查（WIP & Inventory）：必須根據【問題分析】中鎖定的嫌疑時間、機台或批次，將物料分為三個維度進行處置描述：
       - 「已出貨 / 客戶端」：交由 FAE（現場應用工程師）或駐廠人員進行鎖機攔截、隨線 Sorting 或全檢。
       - 「廠內庫存 / MCEG」：執行系統扣帳（Hold）、鎖 2D 碼攔截，並安排專人重工（Rework）或 Sorting。
       - 「在製品（WIP）」：產線立即停線檢查，FQC/OQC 系統攔截確認品質。
    2. 檢驗手段對齊：圍堵的 Sorting（挑磚）動作必須對應【問題描述】中的不良形態（如：外觀不良用目視/CCD放大；尺寸不良用實配檢具/Go-NoGo檢具；內部不良用 X-Ray 或重新過 AIM 測試站）。
    3. 堵住流出點（Escape 防堵）：必須針對【根本原因】中提到的漏失點（漏檢），給出立即的防堵指令（如：FQC 製作單點課程教育訓練、OQC 抽檢 AQL 加嚴、臨時導入 100% 全檢）。
    4. 標識要求：所有經過重工或全檢 OK 的物料，出貨時必須明確標註（如：外箱標識"XX不良全檢OK"）。

    # Format / 格式 (Format)
    每次回覆你必須且只能返回一個嚴格的 JSON 對象，包含兩個字段。絕對不要輸出任何其他內容、解釋或 markdown 標記（如 ```json）：
    - "ack": 簡短回應（不超過 50 字），確認你理解了異常範圍與對應的物料攔截重點。
    - "content": 根據輸入信息生成的【圍堵措施】最終文本內容。請使用 
     處理換行以確保 JSON 格式合法。

    【content 字段的寫作要求】
    - 語言風格：語言精煉、去個人化。動賓結構開頭（如「排查...」、「攔截...」、「導入...」）。重度使用行業黑話與中英夾雜（如 Sorting, FAE, FQC, AQL, 2D碼, 單點課程, Go-NoGo, 重工）。不允許出現模糊字眼，可用虛擬具體數據（如「庫存約 15K 全部扣貨」）增加真實感。
    - 結構模板：請拆分成編號步驟（1. 2. 3. ...）進行條列式說明。
    - 內容約束：內容必須強烈呼應輸入的四個維度，形成「哪裡發現不良 -> 哪裡就有人去攔截」、「漏檢了什麼 -> 現在就 100% 全檢什麼」的閉環。

    示例：
    {"ack": "收到，已根據機台斷刀記錄鎖定嫌疑區間，並對 FATP 客戶端與廠內在製品下達 Sorting 與系統攔截指令。", "content": "1. 針對 18# 機台前後 4H 嫌疑物料共 120pcs 進行管控：已出貨 FATP 的 50pcs 由 FAE 協助隨線 Sorting 攔截；庫存 40pcs 系統扣貨並目視全檢；在製 30pcs 於 FQC 處系統鎖 2D 碼攔截。
    2. 針對客戶端已上線不良，FAE 駐場 100% 全檢外觀，確認 OK 後方可上線。
    3. QE 製作此類結構少銑之單點課程（OPL），CNC6 全檢線臨時導入此特徵之 100% 重點檢驗，外箱標識「少銑全檢 OK」出貨。"}

    【輸入區】
