  target_placeholder: ISSUE_DESCRIPTION
llm_tasks:
- target_placeholder: ISSUE_ANALYSIS
  module: 問題分析
  module_label: 問題分析
  prompt: |
    # Task / 任務 (Task)
    請根據我提供的【Meta Data 元數據】與【問題描述】，推理並撰寫對應的【問題分析】。
    在撰寫時，你必須嚴格遵守以下邏輯與推演限制：

    1. 提取溯源：分析的第一步，必須是利用描述中的 SN/DQR 碼「虛擬查詢」過站記錄，給出具體的（虛擬但合理的）生產時間、線體與機台編號。
    2. 對齊製程：如果元數據顯示為 CNC（金加），排查重點必須圍繞機台首件、刀具（換刀/斷刀記錄）、CMM/OMM 檢測；如果為 Assy（組裝），重點必須是治具/載具磨損、點膠參數（膠量/氣壓/UV固化）、CCD 視覺抓邊或人員重工（Rework）記錄。
    3. 判定共性：根據描述中的不良率（F/R），若是高頻批量不良，推導為設備/治具異常或來料問題；若為極低頻，推導為偶發操作失誤、漏檢或單次重工不良。
    4. 物理推演：用純客觀的工程視角，簡述該不良形態在該工段是如何發生的（如：治具定位柱鬆動導致偏位、切削液與陽極藥水反應導致腐蝕）。

    # Format / 格式 (Format)
    每次回覆你必須且只能返回一個嚴格的 JSON 對象，包含兩個字段。絕對不要輸出任何其他內容、解釋或 markdown 標記（如 ```json）：
    - "ack": 簡短回應（不超過 50 字），確認你理解了用戶的意思及本次分析的製程重點。
    - "content": 更新後的【問題分析】最終文本內容。請使用 
     處理換行以確保 JSON 格式合法。

    【content 字段的寫作要求】
    - 語言風格：語言精煉、去個人化（不使用「我們」、「大概」等詞）。動賓結構開頭（如「查詢...」、「排查...」、「確認...」）。重度使用行業黑話與中英夾雜（如 Trace, SN, CNC, Assy, CCD, NG, OK, Pass, Rework, 治具, 首件）。
    - 結構模板：請拆分成編號步驟（1. 2. 3. ...），或使用「一、物料信息排查 / 二、製程排查」的層級。
    - 內容約束：確保分析內容與元數據的製程、問題描述的失效模式強相關，邏輯閉環。

    示例：
    {"ack": "好的，已根據Assy製程特性與低不良率，排查了磁鐵點膠機台與治具殘膠情況。", "content": "1.查詢不良物料SN過站記錄，均為M1線10/28生產物料，全製程一次過站，無重工記錄。
    2.排查磁鐵點膠機CCD圖片，點膠時磁鐵已偏位，與客訴不良一致。
    3.排查裝配治具，發現偏位磁鐵對應的載具存在殘膠，影響裝配尺寸導致NG。"}

    【輸入區】
     Meta Data: {{metadata}}
    問題描述: {{issue_description}}
  use_rag: true
  rag_tag: faca_kb
  multi_turn_prompt: |
    # Task / 多輪調整

    你剛才在 reason 步驟生成的【問題分析】已經過 sanitize 脫敏處理，用戶當前在介面上看到並要調整的內容如下。請基於你 reason 步驟的完整上下文記憶（含 #資料分析 與 #AI推理 原文）理解用戶意圖，但改寫的對象是「用戶當前看到的脫敏版內容」，而不是你 reason 步驟的原文。

    ## 用戶當前看到的內容（脫敏版）
    {{current_content}}

    ## 用戶的新指令
    {{user_message}}

    ## 規則
    1. 保留脫敏佔位符風格（【日期】【線體編號】【SN碼】【刀具型號】【數量】【不良率】【批次號】等），不要還原成具體數據
    2. 遵守原 reason 步驟的寫作風格與結構要求（動賓結構開頭、編號步驟、行業黑話中英夾雜）
    3. 只改寫用戶指令涉及的部分，其餘保持不變

    ## 輸出格式
    嚴格返回 JSON 對象，絕不輸出 markdown 標記：
    - "ack": 如果用戶在探討方案、詢問原因、討論可能性，ack 可以詳細解釋，不限字數；如果是修改指令，ack 簡短回應（不超過 50 字）
    - "content": 僅當用戶明確要求修改內容時才返回此字段。改寫後的【問題分析】文本，使用 
     處理換行
  pipeline:
    enabled: true
    steps:
    - name: extract
      prompt: |
        # Task / 資料提取
        你是一位資料檢索專家。請從以下【知識庫檢索結果】中，提取與「問題分析」直接相關的資料片段。

        ## 提取規則
        1. 只提取與「問題分析」相關的內容（如：失效現象描述、不良形態、歷史案例中的問題分析段落）
        2. 原封不動提取原文，不改寫、不總結、不推測
        3. 每條資料獨立編號，格式：1. xxx 2. xxx ...
        4. 如果沒有相關資料，輸出「無相關資料」

        ## 輸出格式
        嚴格返回 JSON 對象，包含兩個字段，絕不輸出 markdown 標記（如 ```json）：
        - "ack": "已從知識庫提取 N 條相關資料"
        - "content": "#資料分析
        1. xxx
        2. xxx
        ..."

        【知識庫檢索結果】
        {{rag_context}}
      input_vars:
      - rag_context
      output_var: extract_result
    - name: reason
      prompt: |
        # Task / 任務 (Task)
        請根據我提供的【Meta Data 元數據】、【問題描述】與【參考資料】，推理並撰寫對應的【問題分析】。

        ## 參考資料（來自知識庫）
        {{extract_result}}

        ## 上下文背景
        {{context_background}}

        ## 寫作規則
        在撰寫時，你必須嚴格遵守以下邏輯與推演限制：

        1. 提取溯源：分析的第一步，必須是利用描述中的 SN/DQR 碼「虛擬查詢」過站記錄，給出具體的（虛擬但合理的）生產時間、線體與機台編號。
        2. 對齊製程：如果元數據顯示為 CNC（金加），排查重點必須圍繞機台首件、刀具（換刀/斷刀記錄）、CMM/OMM 檢測；如果為 Assy（組裝），重點必須是治具/載具磨損、點膠參數（膠量/氣壓/UV固化）、CCD 視覺抓邊或人員重工（Rework）記錄。
        3. 判定共性：根據描述中的不良率（F/R），若是高頻批量不良，推導為設備/治具異常或來料問題；若為極低頻，推導為偶發操作失誤、漏檢或單次重工不良。
        4. 物理推演：用純客觀的工程視角，簡述該不良形態在該工段是如何發生的（如：治具定位柱鬆動導致偏位、切削液與陽極藥水反應導致腐蝕）。

        # Format / 格式 (Format)
        每次回覆你必須且只能返回一個嚴格的 JSON 對象，包含兩個字段。絕對不要輸出任何其他內容、解釋或 markdown 標記（如 ```json）：
        - "ack": 簡短回應（不超過 50 字），確認你理解了用戶的意思及本次分析的製程重點。
        - "content": |
            #資料分析
            （原封不動把上面「參考資料」的內容放上來）

            #AI推理
            （你根據上下文生成的問題分析最終文本內容）

        【content #AI推理 字段的寫作要求】
        - 語言風格：語言精煉、去個人化（不使用「我們」、「大概」等詞）。動賓結構開頭（如「查詢...」、「排查...」、「確認...」）。重度使用行業黑話與中英夾雜（如 Trace, SN, CNC, Assy, CCD, NG, OK, Pass, Rework, 治具, 首件）。
        - 結構模板：請拆分成編號步驟（1. 2. 3. ...），或使用「一、物料信息排查 / 二、製程排查」的層級。
        - 內容約束：確保分析內容與元數據的製程、問題描述的失效模式強相關，邏輯閉環。

        示例：
        {"ack": "好的，已根據Assy製程特性與低不良率，排查了磁鐵點膠機台與治具殘膠情況。", "content": "#資料分析\n1. 案例A：磁鐵偏位，載具殘膠導致...\n2. 案例B：點膠偏位，CCD未攔截...\n\n#AI推理\n1.查詢不良物料SN過站記錄，均為M1線10/28生產物料，全製程一次過站，無重工記錄。\n2.排查磁鐵點膠機CCD圖片，點膠時磁鐵已偏位，與客訴不良一致。\n3.排查裝配治具，發現偏位磁鐵對應的載具存在殘膠，影響裝配尺寸導致NG。"}

        【輸入區】
        Meta Data: {{metadata}}
        問題描述: {{issue_description}}
      input_vars:
      - extract_result
      - context_background
      - metadata
      - issue_description
      output_var: reason_result
    - name: sanitize
      prompt: |
        # Task / 資料脫敏

        請將以下內容按段落分區處理：「#資料分析」段落原封不動保留，僅對「#AI推理」段落進行數據脫敏。

        ## 處理步驟
        1. 將輸入內容按「#資料分析」與「#AI推理」標記拆分為兩個段落
        2. 「#資料分析」段落：原封不動保留，不做任何修改
        3. 「#AI推理」段落：按照下方替換規則進行數據脫敏
        4. 將兩個段落重新組合，保持原有的標記與結構

        ## 輸出格式
        - 必須同時包含「#資料分析」與「#AI推理」兩個段落
        - 「#資料分析」段落內容必須與輸入完全一致
        - 「#AI推理」段落內容為脫敏後的版本

        ## 替換規則（嚴格執行）
        - 日期/時間（如 10/28、2024-01-15、10:30）→ 【日期】
        - 線體/機台編號（如 M1線、18#機台、CNC6）→ 【線體編號】或【機台編號】
        - AQL、抽樣標準、尺寸、角度、公差、閾值、製程設定與檢驗標準的具體數值，統一替換為【參數值】；案例序號與條列序號保留。
        - 具體數量/不良率（如 120pcs、50pcs、F/R 0.5%）→ 【數量】或【不良率】
        - 批次號/工單號 → 【批次號】
        - 指標名稱（如 Cell NDA、WF NDA）保留，只替換數值

        ## 範例（分區處理）
        輸入：
        #資料分析
        1. Case: J82x 喇叭網偏位，10/28 M1線生產，F/R 0.5%

        #AI推理
        1. 查詢10/28 M1線生產記錄，18#機台首件NG。
        2. 庫存40pcs，Cell NDA 33.3%（25/75）。

        輸出：
        #資料分析
        1. Case: J82x 喇叭網偏位，10/28 M1線生產，F/R 0.5%

        #AI推理
        1. 查詢【日期】【線體編號】生產記錄，【機台編號】首件NG。
        2. 庫存【數量】，Cell NDA 【不良率】（【數量】）。

        ## 嚴格限制
        1. 絕對保留原意、因果邏輯與原本的標號
        2. 未涉及具體數據的推理句必須一字不改地保留
        3. 除了替換數據，絕對不允許重新造句或改變句型結構
        4. 如無法判定，保留原文，不得反覆推測或輸出判斷過程。

        【待脫敏內容】
        {{reason_result}}
      input_vars:
      - reason_result
      output_var: final_result
- target_placeholder: ROOT_CAUSE
  module: 根本原因
  module_label: 根本原因
  prompt: |
    # Task / 任務 (Task)
    請根據我提供的【Meta Data 元數據】、【問題描述】與【問題分析】，總結並提煉出對應的【根本原因】。
    在撰寫時，你必須嚴格遵守以下邏輯與推演限制：

    1. 雙維歸因結構：根本原因必須且通常只包含兩個獨立維度：
       - 「產生原因（或製程原因）」：物理上到底是什麼異常導致了產品損壞（為什麼會壞）。
       - 「流出原因（或漏出原因）」：品管或系統的哪道防線失效，導致殘次品沒有被攔截（為什麼沒攔住）。
    2. 鎖定物理根因：從【問題分析】中提取最核心的物理、化學或動作失誤（如：T19刀具斷裂、定位氣缸氣管接反、手套破損導致汗液腐蝕）。用簡潔的「A發生異常 -> 導致B狀態 -> 造成C不良」的因果長句式表達。
    3. 明確漏失節點：流出原因必須明確指出在哪個環節失效（如：FQC全檢漏檢、AOI未錄入該缺陷範本、抽檢比例未涵蓋、機台防呆報警未開啟）。
    4. 剔除調查廢話：根本原因是最終的「判決書」，絕不能包含「經排查...」、「查詢系統發現...」、「懷疑是...」等調查過程用語，直接給出客觀定論。

    # Format / 格式 (Format)
    每次回覆你必須且只能返回一個嚴格的 JSON 對象，包含兩個字段。絕對不要輸出任何其他內容、解釋或 markdown 標記（如 ```json）：
    - "ack": 簡短回應（不超過 50 字），確認你已從分析中提取出核心失效機制與防線漏洞。
    - "content": 最終的【根本原因】文本內容。請使用 
     處理換行以確保 JSON 格式合法。

    【content 字段的寫作要求】
    - 語言風格：語言極度精煉、客觀冷峻。重度使用製造業黑話與中英夾雜（如 CNC, Assy, CCD, FQC, AOI, 治具, 載具, 夾屑, 偏位, 漏銑）。
    - 結構模板：請強制使用「產生原因：... 
     流出原因：...」 或 「1. 產生原因：... 
     2. 流出原因：...」 的排版結構。
    - 內容約束：確保提煉出的原因與提供的【Meta Data】製程強相關，並與【問題分析】的結論完全一致。

    示例：
    {"ack": "好的，已從問題分析中精準提取出治具干涉的物理根因與AOI漏檢的防線缺失，生成根本原因。", "content": "1. 產生原因：裝配治具X向設計間隙偏下限，與小件來料溢膠產生干涉，導致裝配壓合時UV膠受擠壓開裂。
    2. 流出原因：Orion flex UV開裂非AOI全檢項目，且目視檢驗人員未及時發現，導致不良品流出。"}

    【輸入區】
    Meta Data: {{metadata}}
    問題描述: {{issue_description}}
    問題分析: {{context_ISSUE_ANALYSIS}}
  use_rag: true
  rag_tag: faca_kb
  multi_turn_prompt: |
