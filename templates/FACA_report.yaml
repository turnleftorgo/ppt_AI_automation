- target_placeholder: CORRECTIVE
  module: 改善對策
  module_label: 改善對策
  prompt: '# Task / 任務 (Task)

    請根據我提供的【Meta Data 元數據】、【問題描述】、【問題分析】、【根本原因】與【圍堵措施】，推演並撰寫最終的【改善對策 (Corrective Actions)】。

    在撰寫時，你必須嚴格遵守以下邏輯與推演限制（只要邏輯有關聯，維持專業工程風格即可）：


    1. 根因對策化 (工程防呆)：針對【根本原因】提出治具修改、機台程式優化（如加入報警停機、防呆 Sensor）或加工參數調整，從物理或系統層面防止異常發生。

    2. 圍堵長效化 (檢驗升級)：將【圍堵措施】中的人工全檢或臨時動作，轉化為長期的檢驗機制。如導入 CCD/AOI 視覺識別、增加專用檢具（Go/No-go）、或在治具上增加檢測功能。

    3. 作業標準化 (SOP與培訓)：針對人員操作，必須包含製作「單點課程 (OPL)」或「不良樣板」，並對生產與檢驗人員（IPQC/FQC）進行教育訓練或盲測考核。

    4. 品管卡控 (QC Gate)：明確提出品質抽驗標準的加嚴（例如：增加巡檢頻率 1次/2H，或 OQC 抽檢 AQL 標準由 0.65 加嚴至 0.4）。


    # Format / 格式 (Format)

    每次回覆你必須且只能返回一個嚴格的 JSON 對象，包含兩個字段。絕對不要輸出任何其他內容、解釋或 markdown 標記（如 ```json）：

    - "ack": 簡短回應（不超過 50 字），確認你理解了異常根因，以及本次改善對策的防堵重點。

    - "content": 最終的【改善對策】文本內容。請使用 \n 處理換行以確保 JSON 格式合法。


    【content 字段的寫作要求】

    - 語言風格：強烈的祈使語氣與行動導向（如「增加...」、「優化...」、「導入...」、「攔截...」）。重度使用行業黑話與中英夾雜（如 防呆, 單點課程,
    CCD, AOI, AIM, AQL, IPQC, FQC, Go/Nogo）。

    - 結構模板：請拆分成編號步驟（1. 2. 3. ...），通常包含製程改善、檢驗改善、人員管理三個維度。

    - 內容約束：確保對策與輸入的根本原因、圍堵措施強相關，形成完整的邏輯閉環。


    示例：

    {"ack": "好的，已針對磁鐵偏位根因，擬定治具防呆優化、AOI視覺導入及AQL加嚴等改善對策。", "content": "1. 治具防呆：生技優化磁鐵裝配治具，X向避位空間增加0.1mm，並加入感應器，未貼合即報警鎖機。\n2.
    檢驗升級：將磁鐵偏位不良加入AOI機台檢測項目，系統自動比對NG範本攔截。\n3. 人員培訓：QE製作磁鐵偏位單點課程，懸掛於檢驗工站，對IPQC及FQC進行教育訓練與盲測。\n4.
    品管加嚴：OQC對此不良做重點抽檢，AQL抽樣標準由0.65加嚴至0.4，防堵不良流出。"}


    【輸入區】

    Meta Data: {{metadata}}

    問題描述: {{issue_description}}

    問題分析: {{context_ISSUE_ANALYSIS}}

    根本原因: {{context_ROOT_CAUSE}}

    圍堵措施: {{context_CONTAINMENT}}

    '
  use_rag: true
  rag_tag: faca_kb
  multi_turn_prompt: "# Task / 多輪調整\n\n你剛才在 reason 步驟生成的【改善對策】已經過 sanitize 脫敏處理，用戶當前在介面上看到並要調整的內容如下。請基於你 reason 步驟的完整上下文記憶（含 #資料分析 與 #AI推理 原文）理解用戶意圖，但改寫的對象是「用戶當前看到的脫敏版內容」，而不是你 reason 步驟的原文。\n\n## 用戶當前看到的內容（脫敏版）\n{{current_content}}\n\n## 用戶的新指令\n{{user_message}}\n\n## 規則\n1. 保留脫敏佔位符風格（【日期】【線體編號】【SN碼】【刀具型號】【數量】【不良率】【批次號】等），不要還原成具體數據\n2. 遵守原 reason 步驟的寫作風格與結構要求（編號步驟、祈使動詞開頭、行業黑話中英夾雜）\n3. 只改寫用戶指令涉及的部分，其餘保持不變\n\n## 輸出格式\n嚴格返回 JSON 對象，絕不輸出 markdown 標記：\n- \"ack\": 如果用戶在探討方案、詢問原因、討論可能性，ack 可以詳細解釋，不限字數；如果是修改指令，ack 簡短回應（不超過 50 字）\n- \"content\": 僅當用戶明確要求修改內容時才返回此字段。改寫後的【改善對策】文本，使用 \\n 處理換行\n"
  pipeline:
    enabled: true
    steps:
    - name: extract
      prompt: '# Task / 資料提取

        你是一位資料檢索專家。請從以下【知識庫檢索結果】中，提取與「改善對策」直接相關的資料片段。


        ## 提取規則

        1. 只提取與「改善對策/糾正措施」相關的內容（如：防呆改造、檢驗升級、SOP優化、歷史案例中的對策段落）

        2. 原封不動提取原文，不改寫、不總結、不推測

        3. 每條資料獨立編號，格式：1. xxx 2. xxx ...

        4. 如果沒有相關資料，輸出「無相關資料」


        ## 輸出格式

        嚴格返回 JSON 對象，包含兩個字段，絕不輸出 markdown 標記（如 ```json）：

        - "ack": "已從知識庫提取 N 條相關資料"

        - "content": "#資料分析\n1. xxx\n2. xxx\n..."


        【知識庫檢索結果】

        {{rag_context}}

        '
      input_vars:
      - rag_context
      output_var: extract_result
    - name: reason
      prompt: "# Task / 任務 (Task)\n請根據我提供的【Meta Data 元數據】、【問題描述】、【問題分析】、【根本原因】、【圍堵措施】與【參考資料】，推演並撰寫最終的【改善對策\
        \ (Corrective Actions)】。\n\n## 參考資料（來自知識庫）\n{{extract_result}}\n\n## 上下文背景\n\
        {{context_background}}\n\n## 寫作規則\n在撰寫時，你必須嚴格遵守以下邏輯與推演限制：\n\n1. 根因對策化 (工程防呆)：針對【根本原因】提出治具修改、機台程式優化或加工參數調整，從物理或系統層面防止異常發生。\n\
        2. 圍堵長效化 (檢驗升級)：將【圍堵措施】中的人工全檢或臨時動作，轉化為長期的檢驗機制。\n3. 作業標準化 (SOP與培訓)：針對人員操作，必須包含製作「單點課程\
        \ (OPL)」或「不良樣板」，並對生產與檢驗人員進行教育訓練或盲測考核。\n4. 品管卡控 (QC Gate)：明確提出品質抽驗標準的加嚴。\n\n\
        ## 輸出格式\n嚴格返回 JSON 對象，包含兩個字段，絕不輸出 markdown 標記（如 ```json）：\n- \"ack\": 簡短回應\n\
        - \"content\": |\n    #資料分析\n    （原封不動把上面「參考資料」的內容放上來）\n\n    #AI推理\n    （你生成的改善對策，條列式，祈使動詞開頭）\n\
        \n【輸入區】\nMeta Data: {{metadata}}\n問題描述: {{issue_description}}\n問題分析: {{context_ISSUE_ANALYSIS}}\n\
        根本原因: {{context_ROOT_CAUSE}}\n圍堵措施: {{context_CONTAINMENT}}\n"
      input_vars:
      - extract_result
      - context_background
      - metadata
      - issue_description
      - context_ISSUE_ANALYSIS
      - context_ROOT_CAUSE
      - context_CONTAINMENT
      output_var: reason_result
    - name: sanitize
      prompt: '# Task / 資料脫敏


        請從以下內容中提取「#AI推理」部分，並將具體數據替換為佔位符，生成脫敏版本。


        ## 處理步驟

        1. 首先，從輸入內容中找到「#AI推理」或「# AI推理」標記

        2. 如果找到該標記，只提取標記之後的內容（不要包含「#資料分析」部分）

        3. 如果找不到該標記，直接對整個輸入內容進行脫敏

        4. 對提取的內容進行數據脫敏


        ## 替換規則（嚴格執行）

        - 日期/時間（如 10/28、2024-01-15、10:30）→ 【日期】

        - 線體/機台編號（如 M1線、18#機台、CNC6）→ 【線體編號】或【機台編號】

        - SN/DQR碼（如 SN123456、DQR-789）→ 【SN碼】

        - 刀具/治具參數（如 T19刀具、0.1mm間隙）→ 【刀具型號】或【參數值】

        - 具體數量/不良率（如 120pcs、50pcs、F/R 0.5%）→ 【數量】或【不良率】

        - 批次號/工單號 → 【批次號】

        - 指標名稱（如 Cell NDA、WF NDA）保留，只替換數值


        ## 範例

        輸入：不良率：Cell NDA 33.3%（25/75）

        輸出：不良率：Cell NDA 【不良率】（【數量】）


        ## 嚴格限制

        1. 絕對保留原意、因果邏輯與原本的標號

        2. 未涉及具體數據的推理句必須一字不改地保留

        3. 除了替換數據，絕對不允許重新造句或改變句型結構

        4. 只輸出脫敏後的最終內容，絕對不要輸出你的推理過程、猶豫或自我糾正


        【待脫敏內容】

        {{reason_result}}'
      input_vars:
      - reason_result
      output_var: final_result
