          output_var: extract_result
        - name: reason
          prompt: "# Task / 任務\n請根據【問題描述】、【流出原因】、【糾正措施】與【參考資料】，給出長效系統預防措施 (Preventive Action)。\n\n## 參考資料（來自知識庫）\n{{extract_result}}\n\n## 上下文背景\n{{context_background}}\n\n## 寫作規則\n1. 橫向平移 (Read-Across)：強制清查廠內所有相似產線、其他專案機種，同步導入物理防呆與檢驗對策。\n2. 檢驗升級與 QC 閘口：將該不良特徵正式納入 AOI 自動化檢測項目；QE 製作單點課程（OPL）對檢驗員進行培訓與盲測；出貨端 OQC 加嚴 AQL 抽樣標準（如由 0.65 降至 0.4）。\n\n## 輸出格式\n嚴格返回 JSON 對象，包含兩個字段，絕不輸出 markdown 標記（如 ```json）：\n- \"ack\": 簡短回應（不超過 50 字），確認落實橫向展開與檢驗防線長效升級。\n- \"content\": |\n    #資料分析\n    （原封不動把上面「參考資料」的內容放上來）\n\n    #AI推理\n    （你生成的預防措施，條列式，管理與品管術語豐富，控制在100字左右）\n\n【輸入區】\n問題描述: {{issue_description}}\n報告主題: {{issue_title}}\n流出原因: {{context_Fill_in_list_of_escape_causes}}\n糾正措施: {{context_Fill_in_list_of_corrective_actions}}\n"
          input_vars:
            - extract_result
            - context_background
            - issue_description
            - issue_title
            - context_Fill_in_list_of_escape_causes
            - context_Fill_in_list_of_corrective_actions
          output_var: reason_result
        - name: sanitize
          prompt: '# Task / 資料脫敏


            請從以下內容中提取「#AI推理」部分，並將具體數據替換為佔位符，生成脫敏版本。


            ## 處理步驟

            1. 首先，從輸入內容中找到「#AI推理」或「# AI推理」標記

            2. 如果找到該標記，只提取標記之後的內容（不要包含「#資料分析」部分）

            3. 如果找不到該標記，直接對整個輸入內容進行脫敏

            4. 對提取的內容進行數據脫敏


            ## 替換規則（嚴格執行）

            - 日期/時間（如 10/28、2024-01-15、10:30）→ 【日期】

            - 線體/機台編號（如 M1線、18#機台、CNC6）→ 【線體編號】或【機台編號】

            - SN/DQR碼（如 SN123456、DQR-789）→ 【SN碼】

            - 刀具/治具參數（如 T19刀具、0.1mm間隙）→ 【刀具型號】或【參數值】

            - 具體數量/不良率（如 120pcs、50pcs、F/R 0.5%）→ 【數量】或【不良率】

            - 批次號/工單號 → 【批次號】

            - 指標名稱（如 Cell NDA、WF NDA）保留，只替換數值


            ## 範例

            輸入：不良率：Cell NDA 33.3%（25/75）

            輸出：不良率：Cell NDA 【不良率】（【數量】）


            ## 嚴格限制

            1. 絕對保留原意、因果邏輯與原本的標號

            2. 未涉及具體數據的推理句必須一字不改地保留

            3. 除了替換數據，絕對不允許重新造句或改變句型結構

            4. 只輸出脫敏後的最終內容，絕對不要輸出你的推理過程、猶豫或自我糾正


            【待脫敏內容】

            {{reason_result}}'
          input_vars:
            - reason_result
          output_var: final_result

# ── Section 4: Context engineering (dependency graph) ─────────────────────────
context_graph:
  generation_order:
    - "Fill_in_list_of_containment_actions"
    - "Fill_in_list_of_root_cause"
    - "Fill_in_list_of_escape_causes"
    - "Fill_in_list_of_corrective_actions"
    - "Fill_in_list_of_preventive_actions"
  dependencies:
    "Fill_in_list_of_containment_actions": []
    "Fill_in_list_of_root_cause": ["Fill_in_list_of_containment_actions"]
    "Fill_in_list_of_escape_causes": ["Fill_in_list_of_containment_actions"]
    "Fill_in_list_of_corrective_actions": ["Fill_in_list_of_root_cause", "Fill_in_list_of_escape_causes"]
    "Fill_in_list_of_preventive_actions": ["Fill_in_list_of_corrective_actions"]
  downstream:
    "Fill_in_list_of_containment_actions": ["Fill_in_list_of_root_cause", "Fill_in_list_of_escape_causes", "Fill_in_list_of_corrective_actions", "Fill_in_list_of_preventive_actions"]
    "Fill_in_list_of_root_cause": ["Fill_in_list_of_corrective_actions", "Fill_in_list_of_preventive_actions"]
    "Fill_in_list_of_escape_causes": ["Fill_in_list_of_corrective_actions", "Fill_in_list_of_preventive_actions"]
    "Fill_in_list_of_corrective_actions": ["Fill_in_list_of_preventive_actions"]
    "Fill_in_list_of_preventive_actions": []
  first_turn_disclaimers:
    - "Fill_in_list_of_root_cause"
    - "Fill_in_list_of_escape_causes"

# ── Section 5: Closure (user can chat with AI or fill manually) ─────────────
closure_tasks:
  - target_placeholder: "TXT_VERIFICATION"
    label: "Verification (品質確認)"
    prompt: |
      # Task / 任務
      請根據【糾正措施】與【預防措施】，撰寫品質確認方案（Verification Plan）。
      1. 驗證方法：明確使用何種檢測手段確認改善有效性。
      2. 驗證標準：給出可量化的判定基準（如不良率降至 0、連續批次無再發）。
      3. 追蹤節點：明確驗證時間與責任人。

      # Format / 格式
      嚴格返回 JSON 對象，包含兩個字段，絕不輸出 markdown 標記（如 ```json）：
      - "ack": 確認驗證方案已涵蓋改善有效性與持續監控。
      - "content": 分步驟條列，控制在100字左右。

      【輸入區】
      問題描述: {{issue_description}}
      報告主題: {{issue_title}}
    use_rag: true
    rag_tag: "faca_kb"

  - target_placeholder: "TXT_REVIEW_RESULTS"
    label: "Review Results (效果追蹤)"
    prompt: |
      # Task / 任務
      請根據本次異常處理的完整過程，撰寫效果追蹤方案（Review Results）。
      1. 追蹤指標與目標值：明確追蹤的 KPI（如不良率、再發率）與目標。
      2. 追蹤週期：設定持續監控的時間範圍。
      3. 效果評估標準：給出判定改善是否有效的量化基準。

      # Format / 格式
      嚴格返回 JSON 對象，包含兩個字段，絕不輸出 markdown 標記（如 ```json）：
      - "ack": 確認效果追蹤方案已涵蓋量化指標與持續監控。
      - "content": 分步驟條列，控制在100字左右。

      【輸入區】
      問題描述: {{issue_description}}
      報告主題: {{issue_title}}
    use_rag: true
    rag_tag: "faca_kb"
