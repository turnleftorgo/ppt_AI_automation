template_id: "5c_report_v1"
template_name: "5C 异常处理报告"
description: "5C异常处理报告模板，包含Characterize/Contain/Cause/Corrective/Closure五个阶段"
ppt_file_path: "5C Report.pptx"

# ── Section 1: User inputs (Characterize phase) ──────────────────────────────
user_inputs:
  - id: "radar_no"
    label: "Radar# (雷达号)"
    placeholder: "请输入Radar编号"
    type: "text"
    required: true

  - id: "issue_title"
    label: "Issue Title (报告主题)"
    placeholder: "请简述异常主题"
    type: "text"
    required: true

  - id: "report_date"
    label: "Date (日期)"
    type: "date"
    required: true

  - id: "issue_description"
    label: "Description (问题描述)"
    placeholder: "请详细描述异常情况"
    type: "textarea"
    required: true

  - id: "champion"
    label: "Champion (相关团队成员)"
    placeholder: "请输入负责人姓名"
    type: "text"

# ── Section 2: Direct mappings (user input -> PPT placeholder, no AI) ───────
direct_mappings:
  - user_input_id: "radar_no"
    target_placeholder: "TXT_RADAR_NO"
  - user_input_id: "issue_title"
    target_placeholder: "TXT_ISSUE_TITLE"
  - user_input_id: "report_date"
    target_placeholder: "TXT_DATE"
  - user_input_id: "issue_description"
    target_placeholder: "TXT_DESC"
  - user_input_id: "champion"
    target_placeholder: "TXT_CHAMPION"

# ── Section 3: AI generation tasks (grouped by module) ──────────────────────
llm_tasks:
  # Contain module - Containment Actions
  - target_placeholder: "Fill in list of containment actions"
    module: "Contain"
    module_label: "Contain (临时对策)"
    prompt: |
      针对以下异常问题：
      问题描述：{{issue_description}}
      报告主题：{{issue_title}}

      请给出临时对策方案（Containment Actions）。
      要求：
      1. 明确临时措施的具体内容
      2. 说明实施时间和责任人
      3. 评估临时措施的有效性
    use_rag: false

  # Cause module - Escape Cause
  - target_placeholder: "Fill in list of escape causes"
    module: "Cause"
    module_label: "Cause (原因分析)"
    prompt: |
      针对以下异常问题：
      问题描述：{{issue_description}}
      报告主题：{{issue_title}}

      请分析为什么该异常未在前期被拦截（Escape Cause）。
      要求：
      1. 分析检测环节的缺失
      2. 指出流程中的漏洞
      3. 提供具体原因列表
    use_rag: false

  # Corrective module - Corrective Actions
  - target_placeholder: "Fill in list of corrective actions"
    module: "Corrective"
    module_label: "Corrective (纠正措施)"
    prompt: |
      针对以下异常问题：
      问题描述：{{issue_description}}
      报告主题：{{issue_title}}

      请给出针对根因的长期改善措施（Corrective Action）。
      要求：
      1. 针对根本原因制定永久措施
      2. 明确实施计划和时间节点
      3. 指定责任人
    use_rag: false

  # Corrective module - Preventive Actions
  - target_placeholder: "Fill in list of preventive actions"
    module: "Corrective"
    module_label: "Corrective (纠正措施)"
    prompt: |
      针对以下异常问题：
      问题描述：{{issue_description}}
      报告主题：{{issue_title}}

      请给出预防类似问题再次发生的预防措施（Preventive Action）。
      要求：
      1. 系统性预防方案
      2. 流程改进措施
      3. 培训和标准化建议
    use_rag: false

# ── Section 4: Closure (user can chat with AI or fill manually) ─────────────
closure_tasks:
  - target_placeholder: "TXT_VERIFICATION"
    label: "Verification (品質確認)"
    prompt: |
      针对以下异常问题：
      问题描述：{{issue_description}}
      报告主题：{{issue_title}}

      请提供品質確認方案（Verification Plan）。
      要求：
      1. 验证改善措施有效性的方法
      2. 验证时间节点和标准
      3. 需要的数据和证据
    use_rag: false

  - target_placeholder: "TXT_REVIEW_RESULTS"
    label: "Review Results (效果追蹤)"
    prompt: |
      针对以下异常问题：
      问题描述：{{issue_description}}
      报告主题：{{issue_title}}

      请提供效果追蹤方案（Review Results）。
      要求：
      1. 追蹤指标和目标值
      2. 追蹤周期
      3. 效果评估标准
    use_rag: false
