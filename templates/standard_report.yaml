template_id: "standard_report_v1"
template_name: "Standard Report"
description: "標準報告模板，包含Meta Data、問題描述、問題分析、根本原因、圍堵措施、改善對策"
ppt_file_path: "Standard_report.pptx"
slide_index: 1

# ── Section 1: User inputs (Characterize phase) ──────────────────────────────
user_inputs:
  - id: "file_name"
    label: "檔案名"
    placeholder: "请输入档案名称"
    type: "text"
    required: true

  - id: "ipad_model"
    label: "iPad機型"
    placeholder: "如 Air、Pro"
    type: "text"
    required: true

  - id: "build"
    label: "Build"
    placeholder: "如 MP、EVT、DVT"
    type: "text"
    required: true

  - id: "ipad_type"
    label: "iPad機種"
    placeholder: "如 J70x、J51x"
    type: "text"
    required: true

  - id: "process"
    label: "製程"
    placeholder: "如 組裝（Assy）、SMT"
    type: "text"
    required: true

  - id: "reporter"
    label: "報告人"
    placeholder: "请输入报告人姓名"
    type: "text"

  - id: "keywords"
    label: "關鍵字"
    placeholder: "请输入关键字"
    type: "text"

  - id: "issue_description"
    label: "問題描述"
    placeholder: "请详细描述问题现象、发现时间、影响范围等"
    type: "textarea"
    required: true

# ── Section 2: Direct mappings (user input -> PPT placeholder, no AI) ───────
direct_mappings:
  - user_input_id: "file_name"
    target_placeholder: "FILE_NAME"
  - user_input_id: "ipad_model"
    target_placeholder: "IPAD_MODEL"
  - user_input_id: "build"
    target_placeholder: "BUILD"
  - user_input_id: "ipad_type"
    target_placeholder: "IPAD_TYPE"
  - user_input_id: "process"
    target_placeholder: "PROCESS"
  - user_input_id: "reporter"
    target_placeholder: "REPORTER"
  - user_input_id: "keywords"
    target_placeholder: "KEYWORDS"
  - user_input_id: "issue_description"
    target_placeholder: "ISSUE_DESCRIPTION"
  - user_input_id: "file_name"
    target_placeholder: "REPORT_TITLE"
  - user_input_id: "file_name"
    target_placeholder: "REPORT_SUBTITLE"

# ── Section 3: AI generation tasks ──────────────────────────────────────────
llm_tasks:
  - target_placeholder: "ISSUE_ANALYSIS"
    module: "問題分析"
    module_label: "問題分析"
    prompt: |
      针对以下问题：
      档案名：{{file_name}}
      iPad机型：{{ipad_model}}
      Build：{{build}}
      iPad机种：{{ipad_type}}
      制程：{{process}}
      问题描述：{{issue_description}}
      关键词：{{keywords}}

      请进行问题分析。
      要求：
      "你是FACA报告智能推测专家，根据用户提供的机型和不良现象，推测可能的根因和对策。\n\n"
        "## 推测逻辑\n\n"
        "### 输入信息\n"
        "用户会提供：\n"
        "1. 机型（如J70x、J48x等）\n"
        "2. 不良现象（如磁铁偏位、漏铣等）\n"
        "3. 制程（如组装Assy、金加CNC等）\n\n"
        "### 推测输出\n"
        "根据【机型+不良现象】匹配历史案例，输出常见的排查维度：\n"
        "- 物料排查：供应商、批次\n"
        "- SN追溯：生产日期、线体、机台\n"
        "- 制程排查：机台状态、治具、刀具\n"
        "- 首件记录：检验结果\n\n"
        "## 输出格式要求\n\n"
        "每个部分必须按【推理输出】的结构进行最终输出，不要有多余的内容：\n"
        "以下是推理示例和参考分析，请先学习推理方式和输出风格，再处理最后的待处理信息。\n\n"
        "---\n\n"
        # ── 推理示例库 (Few-Shot) ─────────────────────────────────────────────
        "## 推理示例\n\n"
        "【示例 1】\n"
        "【输入信息】\n"
        "机型：J70x\n"
        "不良现象：C4 鱼塘磁铁夹异物\n"
        "制程：组装(Assy)\n\n"
        "【推理逻辑 (CoT)】\n"
        "拆解现象：发现磁铁夹异物，拆机确认为磁铁残缺块，初步判定为来料不良或料盘周转损伤。\n"
        "追溯物料与设备：查系统确认BV装配时间，锁定点胶机（1#）、载具（3#）、压合治具（2#），并锁定小件供应商（英斯特）及批次。\n"
        "排查制程：调取点胶前后图片，确认料盘同批磁铁存在残缺，排除次組立人员操作人为损伤。\n"
        "分析漏失：查AOI检测结果一次pass，比对图片发现可见异物，确认AOI存在漏检。\n"
        "综合结论：供应商来料不良导致残缺，AOI漏检导致流出，需从源头和AOI拦截双向排查。\n\n"
        "【推测输出】\n"
        "物料排查：确认供应商（如：英斯特）来料是否存在边缘破损或残缺批次。\n"
        "SN追溯：追溯生产时间、点胶机台号（如1#）、关联的载具和压合治具编号。\n"
        "制程排查：调取次組立和点胶站CCD影像，排查作业员操作流程是否规范，排除人为碰撞。\n"
        "首件记录：排查AOI检测图片及过站记录，确认是否存在特征比对漏失导致的误判Pass。\n\n"
        "【示例 2】\n"
        "【输入信息】\n"
        "机型：J70x\n"
        "不良现象：0.66 Lip height fail (尺寸NG)\n"
        "制程：金加(CNC)\n\n"
        "【推理逻辑 (CoT)】\n"
        "拆解现象：Lip面尺寸测大导致NG。分析扫描数据确定玻璃面局部凸起，造成探点异常。\n"
        "追溯物料与设备：查过站记录及首件检测均无异常，锁定加工机台号（71#）及风险批次生产时间。\n"
        "制程与环境排查：探针探测Lip时（P22点位）探到异物导致补差值偏差，从而加工凸起。\n"
        "分析漏失：Trace AIM检测结果显示OK，推测由于Lip面粘附残胶异物，AIM点激光刚好踩在异物上导致测大流出。\n"
        "综合结论：异物干扰导致探针补偿错误及AIM测量漏失。\n\n"
        "【推测输出】\n"
        "物料排查：排查上游流转物料表面是否存在残胶或异物污染。\n"
        "SN追溯：追溯加工机台号（如71#）及具体生产时间段。\n"
        "制程排查：排查机台探针探测点位（如P22点）是否存在异物干扰，确认机台相近探测值的偏差防呆是否生效。\n"
        "首件记录：排查Trace AIM检测记录及影像，确认视觉量测点是否误扫异物导致检测结果假OK。\n\n"
        "【示例 3】\n"
        "【输入信息】\n"
        "机型：J70x\n"
        "不良现象：RC 内腔结构过铣\n"
        "制程：金加(CNC)\n\n"
        "【推理逻辑 (CoT)】\n"
        "拆解现象：内腔出现过铣（多切削）以及未加工（漏切削）现象。\n"
        "追溯物料与设备：查询首件与过站记录无异常。锁定加工机台号（97#）及生产前后一天的风险批次。\n"
        "排查制程：分析过铣原因，系CNC机台（T3）开粗刀把夹屑，使得刀具偏摆过大，进而导致过铣与未加工。\n"
        "分析漏失：需在刀把位置加装吹气喷管防夹屑，并在CNC夹全检工站进行重点拦截。\n"
        "综合结论：刀具排屑不良引起偏摆，导致物理切削异常。\n\n"
        "【推测输出】\n"
        "物料排查：追溯受影响批次毛坯件是否存在余量异常。\n"
        "SN追溯：追溯加工机台号（如97#）、排查风险批次生产时间。\n"
        "制程排查：重点排查CNC机台刀把状态，检查开粗刀具（如T3刀具）是否夹屑、刀具偏摆幅度及吹气防屑功能是否正常。\n"
        "首件记录：确认首件检测无异常，并排查后续制程全检工站的拦截能力。\n\n"
        "---\n\n"
        # ── 真实输入任务 ─────────────────────────────────────────────────────
        "## <待处理信息>\n\n"
        "【基本信息】\n"
        "档案名：{檔案名}\n"
        "iPad机型：{iPad機型}\n"
        "Build阶段：{Build}\n"
        "iPad机种：{iPad機種}\n"
        "製程：{製程}\n"
        "报告人：{報告人}\n"
        "关键字：{關鍵字}\n\n"
        "【问题描述】\n{problem_description}\n\n"
        "请根据以上信息，按照推测逻辑和输出格式要求，生成该不良问题的製程排查分析。"
      
    use_rag: false

  - target_placeholder: "ROOT_CAUSE"
    module: "根本原因"
    module_label: "根本原因"
    prompt: |
      针对以下问题：
      档案名：{{file_name}}
      iPad机型：{{ipad_model}}
      Build：{{build}}
      iPad机种：{{ipad_type}}
      制程：{{process}}
      问题描述：{{issue_description}}

      请分析根本原因。
      要求：
      1. 使用5Why分析法
      2. 区分直接原因和根本原因
      3. 提供数据支撑
      4. 内容不要超过150字

      【问题分析结果】
      {{context_ISSUE_ANALYSIS}}
    use_rag: false

  - target_placeholder: "CONTAINMENT"
    module: "圍堵措施"
    module_label: "圍堵措施"
    prompt: |
      针对以下问题：
      档案名：{{file_name}}
      iPad机型：{{ipad_model}}
      Build：{{build}}
      iPad机种：{{ipad_type}}
      制程：{{process}}
      问题描述：{{issue_description}}

      请给出围堵措施。
      要求：
      1. 明确临时措施的具体内容
      2. 说明实施时间和责任人
      3. 评估临时措施的有效性
      4. 内容不要超过150字

      【问题分析结果】
      {{context_ISSUE_ANALYSIS}}
      【根本原因结果】
      {{context_ROOT_CAUSE}}
    use_rag: false

  - target_placeholder: "CORRECTIVE"
    module: "改善對策"
    module_label: "改善對策"
    prompt: |
      针对以下问题：
      档案名：{{file_name}}
      iPad机型：{{ipad_model}}
      Build：{{build}}
      iPad机种：{{ipad_type}}
      制程：{{process}}
      问题描述：{{issue_description}}

      请给出改善对策。
      要求：
      1. 针对根本原因制定永久措施
      2. 明确实施计划和时间节点
      3. 指定责任人
      4. 内容不要超过150字

      【问题分析结果】
      {{context_ISSUE_ANALYSIS}}
      【根本原因结果】
      {{context_ROOT_CAUSE}}
      【围堵措施结果】
      {{context_CONTAINMENT}}
    use_rag: false
