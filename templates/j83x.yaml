template_id: "j83x_v1"
template_name: "J83x EVT HSG Insert peel off FACA"
description: "J83x EVT HSG Insert 剥离异常 FACA 报告"
ppt_file_path: "J83x  EVT HSG Insert peel off FACA.pptx"

# ── Section 1: User inputs ───────────────────────────────────────────────────
user_inputs:
  - id: "problem"
    label: "Problem (问题描述)"
    placeholder: "请描述异常问题"
    type: "textarea"
    required: true

  - id: "actual_analysis"
    label: "Actual Analysis (实际分析)"
    placeholder: "请填写实际分析结果"
    type: "textarea"

  - id: "actual_causes"
    label: "Actual Causes (实际原因)"
    placeholder: "请填写实际原因"
    type: "textarea"

  - id: "actual_containment"
    label: "Actual Containment (实际遏制措施)"
    placeholder: "请填写实际采取的遏制措施"
    type: "textarea"

# ── Section 2: Direct mappings ───────────────────────────────────────────────
direct_mappings:
  - user_input_id: "problem"
    target_placeholder: "user input problem"
  - user_input_id: "actual_analysis"
    target_placeholder: "user input analysis"
  - user_input_id: "actual_causes"
    target_placeholder: "user input causes"
  - user_input_id: "actual_containment"
    target_placeholder: "user input containment"

# ── Section 3: AI generation tasks ───────────────────────────────────────────
llm_tasks:
  - target_placeholder: "Fill in predicted containment"
    module: "Contain"
    module_label: "Contain (临时遏制)"
    prompt: |
      针对以下异常问题：
      问题描述：{{problem}}

      请给出临时遏制措施（Predicted Containment）。
      要求：明确措施内容、实施范围、有效性。不超过100字。
    use_rag: false

  - target_placeholder: "Fill in predicted analysis"
    module: "Analysis"
    module_label: "Analysis (失效分析)"
    prompt: |
      针对以下异常问题：
      问题描述：{{problem}}

      请给出失效分析（Predicted Failure Analysis）。
      要求：分析失效模式和机理。不超过100字。
    use_rag: false

  - target_placeholder: "Fill in predicted causes"
    module: "Cause"
    module_label: "Cause (原因分析)"
    prompt: |
      针对以下异常问题：
      问题描述：{{problem}}

      请分析根本原因（Predicted Causes）。
      要求：使用5Why分析法，区分直接原因和根本原因。不超过100字。
    use_rag: false

  - target_placeholder: "Fill in list of corrective actions"
    module: "Corrective"
    module_label: "Corrective (纠正措施)"
    prompt: |
      针对以下异常问题：
      问题描述：{{problem}}

      请给出纠正措施（Corrective Actions）。
      要求：针对根本原因制定永久措施，明确实施计划。不超过100字。
    use_rag: false

# ── Section 4: Closure ───────────────────────────────────────────────────────
closure_tasks: []
