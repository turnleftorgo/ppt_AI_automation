services:
  app:
    build: .
    ports:
      - "3015:3001"
    env_file:
      - .env
    volumes:
      - ./templates:/app/templates
      - ./core:/app/core
      - ./models:/app/models
      - ./static:/app/static
      - ./main.py:/app/main.py
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:3001/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped
