<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPTX AI Generator</title>
  <link rel="stylesheet" href="/static/styles.css" />
  <style>
    .section-card { transition: all 0.2s ease; }
    .chat-bubble-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .module-group { border-left: 4px solid #8b5cf6; }
    #leftPanel::-webkit-scrollbar,
    #rightPanel::-webkit-scrollbar { width: 6px; }
    #leftPanel::-webkit-scrollbar-thumb,
    #rightPanel::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    #rightPanel textarea::-webkit-scrollbar { width: 4px; }
    #rightPanel textarea::-webkit-scrollbar-button { display: none; }
    #rightPanel textarea::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 2px; }
    #rightPanel textarea { resize: vertical; }
  </style>
</head>
<body class="bg-gray-50 h-screen flex flex-col overflow-hidden">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b shrink-0">
    <div class="max-w-[1600px] mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold text-gray-800">FACA Report AI Generator</h1>
      <span class="text-sm text-gray-400">Characterize &rarr; AI Generate &rarr; Refine AI content via edit/chat &rarr; OneClickExportPPT</span>
    </div>
  </header>

  <!-- Main: Two-column layout -->
  <main class="flex-1 grid grid-cols-2 overflow-hidden min-h-0">

    <!-- ═══ Left Panel: Workflow & Interaction ═══ -->
    <div id="leftPanel" class="overflow-y-auto p-6 space-y-6">

      <!-- Template Selection -->
      <section id="templateSection" class="bg-white rounded-xl shadow p-6">
        <h2 class="text-lg font-semibold text-gray-700 mb-4">选择模板</h2>
        <select id="templateSelect" onchange="handleTemplateChange(this.value)"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm
                       focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="">-- 加载中... --</option>
        </select>
        <div id="templateDesc" class="mt-2 text-sm text-gray-500"></div>
      </section>

      <!-- Content Area (hidden until template selected) -->
      <div id="contentArea" class="hidden space-y-6">

        <!-- Phase A: Characterize (user_inputs) -->
        <section id="characterizeSection" class="section-card bg-white rounded-xl shadow p-6">
          <h2 class="text-lg font-semibold text-gray-700 mb-1">
            <span class="inline-block w-7 h-7 bg-blue-500 text-white rounded-full text-center
                         text-sm leading-7 mr-2">1</span>
            Characterize (问题定性)
          </h2>
          <p class="text-sm text-gray-500 mb-4 ml-9">填写基本信息，用于后续AI生成的上下文</p>
          <div id="characterizeFields" class="grid grid-cols-1 gap-4 ml-9"></div>
          <div class="mt-4 ml-9 flex items-center gap-4">
            <button id="btnConfirm" onclick="handleCharacterizeConfirm()"
                    class="px-6 py-2 bg-blue-600 text-white rounded-lg
                           hover:bg-blue-700 transition text-sm font-semibold disabled:opacity-50">
              确认并生成
            </button>
            <div id="confirmStatus" class="text-sm text-gray-500"></div>
          </div>
        </section>

        <!-- Phase B: AI Generation (llm_tasks, grouped by module) -->
        <section id="aiSection" class="section-card bg-white rounded-xl shadow p-6">
          <h2 class="text-lg font-semibold text-gray-700 mb-1">
            <span class="inline-block w-7 h-7 bg-purple-500 text-white rounded-full text-center
                         text-sm leading-7 mr-2">2</span>
            AI Generation (智能生成)
          </h2>
          <p class="text-sm text-gray-500 mb-4 ml-9">基于填写的信息，AI将生成各模块内容。支持多轮对话修改。</p>
          <div id="aiModules" class="space-y-6 ml-9"></div>
        </section>

        <!-- Phase C: Closure (closure_tasks) -->
        <section id="closureSection" class="section-card bg-white rounded-xl shadow p-6 hidden">
          <h2 class="text-lg font-semibold text-gray-700 mb-1">
            <span class="inline-block w-7 h-7 bg-green-500 text-white rounded-full text-center
                         text-sm leading-7 mr-2">3</span>
            Closure (关闭归档)
          </h2>
          <p class="text-sm text-gray-500 mb-4 ml-9">填写关闭阶段信息</p>
          <div id="closureFields" class="space-y-4 ml-9"></div>
        </section>

        <!-- Export -->
        <section id="exportSection" class="section-card bg-white rounded-xl shadow p-6">
          <div class="flex items-center gap-4">
            <button id="btnExport" onclick="handleExport()"
                    class="px-6 py-3 bg-green-600 text-white rounded-lg
                           hover:bg-green-700 transition text-sm font-semibold">
              导出 PPTX
            </button>
            <div id="exportStatus" class="text-sm text-gray-500"></div>
          </div>
        </section>

      </div>
    </div>

    <!-- ═══ Right Panel: Live Preview ═══ -->
    <div id="rightPanel" class="overflow-hidden bg-gray-100 border-l border-gray-200 p-6 hidden flex flex-col h-full min-h-0">
      <h2 class="text-lg font-semibold text-gray-700 mb-4 shrink-0">
        <span id="previewTitle">Report Preview</span>
      </h2>
      <div id="previewTable" class="flex-1 min-h-0 flex flex-col"></div>
    </div>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
