<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PPTX AI Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .placeholder-row { transition: all 0.2s ease; }
    .placeholder-row:hover { background-color: #f9fafb; }
    .fade-in { animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <!-- Header -->
  <header class="bg-white shadow-sm border-b">
    <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between">
      <h1 class="text-xl font-bold text-gray-800">PPTX AI Generator</h1>
      <span class="text-sm text-gray-400">模板选择 &rarr; AI 生成 &rarr; 手动修改 &rarr; 导出</span>
    </div>
  </header>

  <main class="max-w-5xl mx-auto px-6 py-8 space-y-8">

    <!-- Step 1: Template Selection -->
    <section id="step1" class="bg-white rounded-xl shadow p-6">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">1. 选择模板</h2>
      <div class="flex items-center gap-4">
        <select id="templateSelect"
                onchange="handleTemplateChange(this.value)"
                class="flex-1 border border-gray-300 rounded-lg px-3 py-2 text-sm
                       focus:ring-2 focus:ring-blue-500 focus:border-transparent">
          <option value="">-- 加载中... --</option>
        </select>
      </div>
      <div id="templateInfo" class="mt-3 text-sm text-gray-500"></div>
    </section>

    <!-- Step 2: Placeholder Generation -->
    <section id="step2" class="bg-white rounded-xl shadow p-6 hidden">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">2. 逐项生成内容</h2>
      <div id="placeholderList" class="space-y-4"></div>
    </section>

    <!-- Step 3: Export -->
    <section id="step3" class="bg-white rounded-xl shadow p-6 hidden">
      <h2 class="text-lg font-semibold text-gray-700 mb-4">3. 导出</h2>
      <div class="flex items-center gap-4">
        <button id="btnExport" onclick="handleExport()"
                class="px-6 py-3 bg-green-600 text-white rounded-lg
                       hover:bg-green-700 transition text-sm font-semibold">
          导出 PPTX
        </button>
        <div id="exportStatus" class="text-sm text-gray-500"></div>
      </div>
    </section>

  </main>

  <script src="/static/app.js"></script>
</body>
</html>
